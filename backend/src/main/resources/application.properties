# ============================================
# BRANDVOICE AI - APPLICATION CONFIGURATION
# ============================================

spring.application.name=BrandVoice AI Tweet Generator
server.port=8080

# ============================================
# GROQ API CONFIGURATION (FREE AI)
# ============================================

# Groq API Key
groq.api.url=${GROQ_API_URL}
groq.api.key=${GROQ_API_KEY}

# Groq Endpoint
# AI Model
groq.model=llama-3.1-8b-instant

# Max tokens
groq.max-tokens=2000

# Temperature
groq.temperature=0.7

# ============================================
# CORS CONFIGURATION
# ============================================

cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:5500,https://brandvoice-ai-dfd5.onrender.com

# ============================================
# LOGGING
# ============================================

logging.level.root=INFO
logging.level.com.brandvoice=DEBUG
logging.level.org.springframework.web=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# JACKSON
# ============================================

spring.jackson.serialization.indent-output=true
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC

# ============================================
# ACTUATOR
# ============================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

info.app.name=BrandVoice AI Tweet Generator
info.app.description=AI-powered tweet generation for brands
info.app.version=1.0.0
